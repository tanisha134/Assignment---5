<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css">

    <title>Github Issue Tracker</title>
</head>
<body class="bg-[#F8FAFC]">
    <!-- NAVBAR -->

    <div class="navbar shadow px-6">

        <div class="flex items-center gap-3">
            <img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="" class="w-8">

            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>

        </div>
        <div class="flex gap-2 ml-aulo">
            <input id="searchInput" type="text" placeholder="Search Issues" class="input input-bordered">

            <button onclick="searchIssue()" class="btn btn-primary">+New Issues</button>

        </div>
    </div>

    <!-- Tab Buttons -->

    <div class="p-6 bg-white mt-5">
        <div class="flex gap-3 mb-6">

            <button id="tab-all" onclick="loadIssues('all')" class="btn tab-btn bg-[#4A00FF] text-white font-semibold text-[14px]">
                All
            </button>

            <button id="tab-open" onclick="loadIssues('open')" class="btn tab-btn text-black font-semibold text-[14px]">
                Open
            </button>

            <button id="tab-close" onclick="loadIssues('close')" class="btn tab-btn text-black font-semibold text-[14px]">
                Close
            </button>
        </div>
        <div class="flex justify-between items-center mb-5 px-2 bg-white p-6 mt-5">

            <h2 id="issueTitle" class="text-xl font-bold"> All Issues <span id="issueCount">0</span>
            </h2>

            <div class="flex items-center gap-6 text-sm">

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span><span>Open</span>
                </div>

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span><span>Close</span>
                </div>
            </div>
        </div>

        <!-- Issues Grid -->

        <div id="issuesContainer" class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-6">

        </div>


    </div>
    <script src="script.js"></script>
    
</body>
</html>
